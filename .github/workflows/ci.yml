name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install \
            pkg-config \
            sdl2 \
            sdl2_mixer \
            freetype \
            harfbuzz \
            pango \
            fontconfig

      - name: Test
        run: go test -cover ./gui/...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        working-directory: go-gui
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CGO_ENABLED=1 \
          GOOS=darwin \
          GOARCH=arm64 \
          CC="clang -isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
          go build -tags ios ./gui/backend/ios/...

      - name: Vet
        working-directory: go-gui
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CGO_ENABLED=1 \
          GOOS=darwin \
          GOARCH=arm64 \
          CC="clang -isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
          go vet -tags ios ./gui/backend/ios/...

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        working-directory: go-gui
        run: GOOS=js GOARCH=wasm go build ./...

      - name: Vet
        working-directory: go-gui
        run: GOOS=js GOARCH=wasm go vet ./...

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test
        working-directory: go-gui
        run: |
          NODE_JS="$(find "$(go env GOROOT)" -name wasm_exec_node.js -print -quit)"
          printf '#!/bin/bash\nexec node "%s" "$@"\n' "$NODE_JS" > /tmp/go_js_wasm_exec
          chmod +x /tmp/go_js_wasm_exec
          GOOS=js GOARCH=wasm go test -exec=/tmp/go_js_wasm_exec ./gui/...
