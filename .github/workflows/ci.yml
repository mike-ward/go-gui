name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install \
            pkg-config \
            sdl2 \
            freetype \
            harfbuzz \
            pango \
            fontconfig

      - name: Test
        run: go test ./gui/...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Vet
        run: go vet ./...

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        working-directory: go-gui
        run: |
          pkgs=$(GOOS=js GOARCH=wasm go list -e -f '{{if not .Error}}{{.ImportPath}}{{end}}' ./...)
          GOOS=js GOARCH=wasm go build $pkgs

      - name: Vet
        working-directory: go-gui
        run: |
          pkgs=$(GOOS=js GOARCH=wasm go list -e -f '{{if not .Error}}{{.ImportPath}}{{end}}' ./...)
          GOOS=js GOARCH=wasm go vet $pkgs

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test
        working-directory: go-gui
        run: |
          export PATH="$(go env GOROOT)/misc/wasm:$PATH"
          pkgs=$(GOOS=js GOARCH=wasm go list -e -f '{{if not .Error}}{{.ImportPath}}{{end}}' ./gui/...)
          GOOS=js GOARCH=wasm go test $pkgs
