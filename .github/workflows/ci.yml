name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install \
            pkg-config \
            sdl2 \
            sdl2_mixer \
            freetype \
            harfbuzz \
            pango \
            fontconfig

      - name: Add go-glyph replace
        working-directory: go-gui
        run: go mod edit -replace=github.com/mike-ward/go-glyph=../go-glyph

      - name: Test
        working-directory: go-gui
        run: go test ${{ runner.os == 'Linux' && '-race' || '' }} -coverprofile=coverage.out ./gui/...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: go-gui/coverage.out
          retention-days: 30

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        working-directory: go-gui
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CGO_ENABLED=1 \
          GOOS=darwin \
          GOARCH=arm64 \
          CC="clang -isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
          go build -tags ios ./gui/backend/ios/...

      - name: Vet
        working-directory: go-gui
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CGO_ENABLED=1 \
          GOOS=darwin \
          GOARCH=arm64 \
          CC="clang -isysroot $SDK -arch arm64 -miphoneos-version-min=15.0" \
          go vet -tags ios ./gui/backend/ios/...

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        working-directory: go-gui
        run: GOOS=js GOARCH=wasm go build ./...

      - name: Vet
        working-directory: go-gui
        run: GOOS=js GOARCH=wasm go vet ./...

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test
        working-directory: go-gui
        run: |
          NODE_JS="$(find "$(go env GOROOT)" -name wasm_exec_node.js -print -quit)"
          printf '#!/bin/bash\nexec node "%s" "$@"\n' "$NODE_JS" > /tmp/go_js_wasm_exec
          chmod +x /tmp/go_js_wasm_exec
          GOOS=js GOARCH=wasm go test -exec=/tmp/go_js_wasm_exec ./gui/...

  windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-fontconfig

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        working-directory: go-gui
        run: CGO_ENABLED=1 go build ./...

      - name: Vet
        working-directory: go-gui
        run: CGO_ENABLED=1 go vet ./...

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: go-gui

      - uses: actions/checkout@v4
        with:
          repository: mike-ward/go-glyph
          path: go-glyph

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        working-directory: go-gui
        run: |
          NDK_CC=$(find $ANDROID_NDK_ROOT -name "aarch64-linux-android*-clang" \
            | grep -v clang++ | sort | tail -1)
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 CC=$NDK_CC \
            go build ./gui/backend/android/...

      - name: Vet
        working-directory: go-gui
        run: |
          NDK_CC=$(find $ANDROID_NDK_ROOT -name "aarch64-linux-android*-clang" \
            | grep -v clang++ | sort | tail -1)
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 CC=$NDK_CC \
            go vet ./gui/backend/android/...

  benchmark:
    name: Benchmarks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libpango1.0-dev \
            libfontconfig1-dev \
            libhunspell-dev

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=5 -run='^$' -timeout=30m ./gui/... | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 90

      - name: Track benchmarks
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'go'
          output-file-path: benchmark-results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench
