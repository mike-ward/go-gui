<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ccc">
  <style>
    @keyframes pulse {
      0%, 100% { fill-opacity: 1 }
      50%      { fill-opacity: 0.2 }
    }
    .pulse { animation: pulse 0.9s ease-in-out infinite }
    rect   { fill: #009688 }
  </style>
  <g>
    <rect class="pulse" x="2"  y="10" width="4" height="4"/>
    <rect class="pulse" x="10" y="10" width="4" height="4" style="fill:#e91e63"/>
    <rect class="pulse" x="18" y="10" width="4" height="4" fill="#ff9800"/>
  </g>
</svg>
