version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - revive
  settings:
    revive:
      rules:
        - name: exported
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
